judge_model: gpt-5.2_judgment
temperature: 0.0
max_tokens: 32768

reference: null

prompt_template: |
  You are a scoring assistant for financial questions. You will be given:
      1. A question
      2. The ground truth answer
      3. A candidate answer
  Your goal is to determine whether the candidate answer matches the meaning of the ground truth, following these guidelines:
      - If the ground truth is a numerical value, differences in format (e.g., 0.98 vs 98%) or minor rounding differences (e.g., 2 vs 1.98) are considered consistent.
      - If the ground truth is a multiple-choice label (A, B, C, D, etc.), correctness depends only on whether the candidate answer selects the same label. Any additional text or explanation should be ignored.

  <question>
  {question}
  </question>>    

  <ground truth>
  {ground_truth}
  </ground truth>

  <candidate answer>
  {candidate_answer}
  </candidate answer>


  You must provide explanation, focusing solely on evaluating the candidate answer. Specifically:
      - Explain why the candidate answer is correct or incorrect with respect to the ground truth and the rules.
      - After reasoning, provide the final verdict: "1" if the meanings are consistent, "0" if not.